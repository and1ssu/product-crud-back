services:
  postgres:
    image: postgres:16-alpine
    container_name: produtos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: produtos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d produtos"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: produtos-backend
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/produtos?schema=public"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
